name: 國際台股聯動日報 - 每日市場分析

on:
  schedule:
    # 每日 06:30 台灣時間（UTC+8）= 22:30 UTC（前一天）
    - cron: '30 22 * * 0-4'  # 週一至週五
  workflow_dispatch:  # 支援手動觸發

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行市場數據抓取
        id: fetch_data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/data_fetcher.py

      - name: 生成 AI 市場分析報告
        id: generate_report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/market_analyzer.py

      - name: 生成語音版本
        id: generate_audio
        env:
          GOOGLE_CLOUD_TTS_KEY: ${{ secrets.GOOGLE_CLOUD_TTS_KEY }}
          AZURE_TTS_KEY: ${{ secrets.AZURE_TTS_KEY }}
        run: python scripts/tts_generator.py

      - name: 推送到 Telegram
        id: telegram_notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_sender.py

      - name: 上傳工作流日誌
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: workflow-logs
          path: logs/
          retention-days: 7

      - name: 報告執行結果
        if: always()
        run: |
          echo "✅ 工作流執行完成"
          echo "📊 報告生成時間: $(date '+%Y-%m-%d %H:%M:%S')"
